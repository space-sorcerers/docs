name: Test Mintlify Build

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Mintlify CLI
        run: npm i -g mintlify
      - name: Validate documentation
        run: mint validate
